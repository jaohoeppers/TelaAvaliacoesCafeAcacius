<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/gestao.css">
    </head>
    <body>
        <main class="page_main">
            <header class="page_header">
                <h1>Gestão de Avaliações</h1>
                <button id="btn_logout" class="btn-logout" onclick="logout()" style="display: none;">
                    <span class="logout-icon">🚪</span>
                    <span class="logout-text">Sair</span>
                </button>
            </header>

            <section id="login_section">
                <h2>Login de Administrador</h2>
                <div class="login_field">
                    <label for="admin_password">Senha:</label>
                    <input type="password" id="admin_password" name="admin_password" aria-describedby="password_help" onkeypress="if(event.key === 'Enter') validar_senha()">
                    <small id="password_help" class="hint">Insira a senha de administrador para acessar as avaliações.</small>
                </div>
                <button class="btn_enviar" onclick="validar_senha()">Entrar</button>
                <div id="login_msg" class="message" role="status" aria-live="polite"></div>
            </section>

            <section id="gestao_section" style="display: none;">
                <!-- Barra lateral de navegação -->
                <aside class="sidebar">
                    <button class="sidebar-tab active" onclick="abrirAbaGeral()">
                        <span class="tab-icon">📊</span>
                        <span class="tab-label">Geral</span>
                    </button>
                    <button class="sidebar-tab" onclick="abrirAbaSalas()">
                        <span class="tab-icon">🏠</span>
                        <span class="tab-label">Salas</span>
                    </button>
                </aside>

                <!-- Área de conteúdo principal -->
                <div class="main-content">
                </div>
            </section>

            <footer class="page_footer">
                <small>Painel de gestão administrativo.</small>
            </footer>

        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
        <script type="module" src="js/gerarTelas.js"></script>
        <script type="module" src="js/scriptADM.js"></script>
    </body>
</html>
