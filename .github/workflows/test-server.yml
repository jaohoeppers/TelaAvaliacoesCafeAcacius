name: Test Web Server
description: "Testa se o servidor PHP está funcionando corretamente e se os endpoints da API estão respondendo como esperado."

on:
  workflow_call:
  workflow_dispatch:
  

jobs:
  test-server:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        extensions: pgsql, pdo_pgsql
    
    - name: Criar config.php para testes
      run: |
        cat > config.php << 'EOF'
        <?php
        DEFINE('dbHost', 'localhost');
        DEFINE('dbPort', 5432);
        DEFINE('dbName', 'avaliacoes');
        DEFINE('dbUser', 'consultas');
        DEFINE('dbPass', '123456');
        DEFINE('dbschema', 'dados');
        DEFINE('senhaAdmin', '123');
        ?>
        EOF
    
    - name: Iniciar servidor PHP
      run: |
        cd public
        php -S 0.0.0.0:8080 &
        sleep 3
      continue-on-error: true
    
    - name: Testar se index.html está acessível (porta 8080)
      run: |
        curl -f http://localhost:8080/index.html || echo "Porta 8080 não acessível"
      continue-on-error: true
    
    - name: Verificar acessibilidade do index.html
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/index.html)
        if [ $response -eq 200 ]; then
          echo "✅ Sucesso! index.html está acessível na porta 8080"
          echo "Código HTTP: $response"
        else
          echo "❌ Falha! index.html retornou código: $response"
          exit 1
        fi
    
    - name: Testar conteúdo do index.html
      run: |
        content=$(curl -s http://localhost:8080/index.html)
        if echo "$content" | grep -q "Sistema de Avaliações"; then
          echo "✅ Conteúdo do index.html verificado com sucesso"
        else
          echo "⚠️ Aviso: Conteúdo esperado não encontrado no index.html"
        fi
    
    - name: Mostrar logs do servidor (em caso de erro)
      if: failure()
      run: |
        echo "=== Verificando erros do PHP ==="
        ps aux | grep php || echo "Nenhum processo PHP encontrado"
        netstat -tuln | grep -E '(8080)' || echo "Porta 8080 não está escutando"
