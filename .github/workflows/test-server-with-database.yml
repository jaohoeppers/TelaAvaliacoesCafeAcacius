name: Test with Database
description: "Inicialixa um banco de dados PostgreSQL, importa um dump e testa os endpoints da API usando PHP e cURL."

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test-api-endpoints:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: avaliacoes
          POSTGRES_USER: consultas
          POSTGRES_PASSWORD: 123456
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        extensions: pgsql, pdo_pgsql
    
    - name: Aguardar PostgreSQL estar pronto
      run: |
        until pg_isready -h localhost -p 5432 -U consultas; do
          echo "Aguardando PostgreSQL..."
          sleep 2
        done
        echo "✅ PostgreSQL está pronto!"
    
    - name: Criar schema
      run: |
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "CREATE SCHEMA IF NOT EXISTS dados;"
        echo "✅ Schema 'dados' criado com sucesso"
    
    - name: Importar dump SQL
      run: |
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -f sql/dump-avaliacoes-202512042105.sql
        echo "✅ Banco de dados importado com sucesso"
    
    - name: Verificar tabelas
      run: |
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "\dt dados.*"
        echo "✅ Tabelas verificadas"
    
    - name: Criar config.php
      run: |
        cat > config.php << 'EOF'
        <?php
        DEFINE('dbHost', 'localhost');
        DEFINE('dbPort', 5432);
        DEFINE('dbName', 'avaliacoes');
        DEFINE('dbUser', 'consultas');
        DEFINE('dbPass', '123456');
        DEFINE('dbschema', 'dados');
        DEFINE('senhaAdmin', '123');
        ?>
        EOF
        echo "✅ config.php criado"
    
    - name: Iniciar servidor PHP
      run: |
        php -S 0.0.0.0:8080 -t . &
        sleep 3
        echo "✅ Servidor PHP iniciado na porta 8080"
    
    - name: Testar Endpoint 1 - Validar Senha Admin
      run: |
        echo "Testando: Validação de senha do administrador"
        response=$(curl -s "http://localhost:8080/src/backend.php?action=valida_senha&senha=123")
        echo "Resposta: $response"
        if echo "$response" | grep -q '"valid":true'; then
          echo "✅ Teste 1 PASSOU: Senha do admin validada com sucesso"
        else
          echo "❌ Teste 1 FALHOU: Esperado valid:true"
          exit 1
        fi
    
    - name: Testar Endpoint 2 - Obter Salas
      run: |
        echo "Testando: Obter Salas"
        response=$(curl -s "http://localhost:8080/src/backend.php?action=get_salas")
        echo "Resposta: $response"
        if echo "$response" | grep -qE '\[.*\]'; then
          echo "✅ Teste 2 PASSOU: Salas recuperadas com sucesso"
        else
          echo "❌ Teste 2 FALHOU: Esperado array de salas"
          exit 1
        fi
    
    - name: Testar Endpoint 3 - Obter Todas as Perguntas
      run: |
        echo "Testando: Obter Todas as Perguntas"
        response=$(curl -s "http://localhost:8080/src/backend.php?action=get_todas_perguntas")
        echo "Resposta: $response"
        if echo "$response" | grep -qE '\[.*\]'; then
          echo "✅ Teste 3 PASSOU: Perguntas recuperadas com sucesso"
        else
          echo "❌ Teste 3 FALHOU: Esperado array de perguntas"
          exit 1
        fi
    
    - name: Testar Endpoint 4 - Obter Respostas
      run: |
        echo "Testando: Obter Respostas"
        response=$(curl -s "http://localhost:8080/src/backend.php?action=get_respostas")
        echo "Resposta: $response"
        if echo "$response" | grep -qE '\[.*\]'; then
          echo "✅ Teste 4 PASSOU: Respostas recuperadas com sucesso"
        else
          echo "❌ Teste 4 FALHOU: Esperado array de respostas"
          exit 1
        fi
    
    - name: Testar Endpoint 5 - Senha Inválida
      run: |
        echo "Testando: Senha inválida do administrador"
        response=$(curl -s "http://localhost:8080/src/backend.php?action=valida_senha&senha=wrong")
        echo "Resposta: $response"
        if echo "$response" | grep -q '"valid":false'; then
          echo "✅ Teste 5 PASSOU: Senha inválida rejeitada corretamente"
        else
          echo "❌ Teste 5 FALHOU: Esperado valid:false"
          exit 1
        fi
    
    - name: Resumo
      if: success()
      run: |
        echo ""
        echo "========================================="
        echo "✅ TODOS OS TESTES PASSARAM COM SUCESSO! ✅"
        echo "========================================="
        echo ""
        echo "Testes completados:"
        echo "  1. ✅ Validação de senha do administrador"
        echo "  2. ✅ Endpoint obter salas"
        echo "  3. ✅ Endpoint obter todas as perguntas"
        echo "  4. ✅ Endpoint obter respostas"
        echo "  5. ✅ Rejeição de senha inválida"
        echo ""
    
    - name: Mostrar logs em caso de falha
      if: failure()
      run: |
        echo "=== Status do PostgreSQL ==="
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "SELECT version();" || echo "Falha ao conectar ao banco de dados"
        echo ""
        echo "=== Processos PHP ==="
        ps aux | grep php || echo "Nenhum processo PHP encontrado"
        echo ""
        echo "=== Portas de Rede ==="
        netstat -tuln | grep -E '(8080|5432)' || echo "Portas não estão escutando"
