name: Test Database Configuration
description: "Testa a configuração do banco de dados PostgreSQL, verifica se o schema e as tabelas estão corretas, e garante que o dump SQL seja importado com sucesso."

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test-database:
    name: Testar Configuração do Banco de Dados
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: avaliacoes
          POSTGRES_USER: consultas
          POSTGRES_PASSWORD: 123456
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Aguardar PostgreSQL estar pronto
      run: |
        echo "Aguardando PostgreSQL estar completamente pronto..."
        until pg_isready -h localhost -p 5432 -U consultas; do
          echo "PostgreSQL ainda não está pronto, aguardando..."
          sleep 2
        done
        echo "✅ PostgreSQL está pronto e aceitando conexões!"
    
    - name: Testar conexão com o banco de dados
      run: |
        echo "Testando conexão com o banco de dados..."
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "SELECT version();"
        if [ $? -eq 0 ]; then
          echo "✅ Conexão com o banco de dados bem-sucedida!"
        else
          echo "❌ Falha ao conectar ao banco de dados"
          exit 1
        fi
    
    - name: Criar schema 'dados'
      run: |
        echo "Criando schema 'dados'..."
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "CREATE SCHEMA IF NOT EXISTS dados;"
        if [ $? -eq 0 ]; then
          echo "✅ Schema 'dados' criado com sucesso!"
        else
          echo "❌ Falha ao criar schema"
          exit 1
        fi
    
    - name: Verificar se schema existe
      run: |
        echo "Verificando se schema 'dados' existe..."
        result=$(PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -t -c "SELECT schema_name FROM information_schema.schemata WHERE schema_name = 'dados';")
        if echo "$result" | grep -q "dados"; then
          echo "✅ Schema 'dados' verificado!"
        else
          echo "❌ Schema 'dados' não encontrado"
          exit 1
        fi
    
    - name: Importar dump SQL
      run: |
        echo "Importando dump SQL de sql/dump.sql..."
        PGPASSWORD=123456 pg_restore -h localhost -U consultas -d avaliacoes --no-owner --no-privileges sql/dump.sql
        if [ $? -eq 0 ]; then
          echo "✅ Dump SQL importado com sucesso!"
        else
          echo "❌ Falha ao importar dump SQL"
          exit 1
        fi
    
    - name: Verificar se as tabelas existem
      run: |
        echo "Verificando se todas as tabelas necessárias existem..."
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "\dt dados.*"
        
        tables=("salas" "perguntas" "respostas" "feedback")
        for table in "${tables[@]}"; do
          result=$(PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -t -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'dados' AND table_name = '$table';")
          if echo "$result" | grep -q "$table"; then
            echo "✅ Tabela 'dados.$table' existe"
          else
            echo "❌ Tabela 'dados.$table' não encontrada"
            exit 1
          fi
        done
    
    - name: Testar SELECT na tabela salas
      run: |
        echo "Testando consulta SELECT em dados.salas..."
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "SELECT * FROM dados.salas LIMIT 5;"
        if [ $? -eq 0 ]; then
          echo "✅ Consulta SELECT em salas bem-sucedida!"
        else
          echo "❌ Falha ao consultar tabela salas"
          exit 1
        fi
    
    - name: Testar SELECT na tabela perguntas
      run: |
        echo "Testando consulta SELECT em dados.perguntas..."
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "SELECT * FROM dados.perguntas LIMIT 5;"
        if [ $? -eq 0 ]; then
          echo "✅ Consulta SELECT em perguntas bem-sucedida!"
        else
          echo "❌ Falha ao consultar tabela perguntas"
          exit 1
        fi
    
    - name: Testar operações INSERT e DELETE
      run: |
        echo "Testando operação INSERT..."
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "
          INSERT INTO dados.salas (descricao, ativo) 
          VALUES ('Sala de Teste', true) 
          RETURNING id;
        "
        
        if [ $? -eq 0 ]; then
          echo "✅ Operação INSERT bem-sucedida!"
        else
          echo "❌ Falha ao inserir dados"
          exit 1
        fi
        
        echo "Limpando dados de teste..."
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "
          DELETE FROM dados.salas WHERE descricao = 'Sala de Teste';
        "
        echo "✅ Limpeza concluída!"
    
    - name: Verificar estruturas das tabelas
      run: |
        echo "Verificando estruturas das tabelas..."
        
        echo "=== Estrutura de dados.salas ==="
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "\d dados.salas"
        
        echo ""
        echo "=== Estrutura de dados.perguntas ==="
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "\d dados.perguntas"
        
        echo ""
        echo "=== Estrutura de dados.respostas ==="
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "\d dados.respostas"
        
        echo ""
        echo "=== Estrutura de dados.feedback ==="
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "\d dados.feedback"
        
        echo "✅ Todas as estruturas de tabelas verificadas!"
    
    - name: Contar registros em cada tabela
      run: |
        echo "Contando registros em cada tabela..."
        
        salas_count=$(PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -t -c "SELECT COUNT(*) FROM dados.salas;")
        perguntas_count=$(PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -t -c "SELECT COUNT(*) FROM dados.perguntas;")
        respostas_count=$(PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -t -c "SELECT COUNT(*) FROM dados.respostas;")
        feedback_count=$(PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -t -c "SELECT COUNT(*) FROM dados.feedback;")
        
        echo "📊 Contagem de registros:"
        echo "  - Salas: $salas_count"
        echo "  - Perguntas: $perguntas_count"
        echo "  - Respostas: $respostas_count"
        echo "  - Feedback: $feedback_count"
        echo ""
        echo "✅ Contagem de registros concluída!"
    
    - name: Testar constraints do banco de dados
      run: |
        echo "Testando constraints e relacionamentos do banco de dados..."
        
        # Test foreign key constraint
        echo "Testando constraints de chave estrangeira..."
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "
          SELECT 
            tc.table_schema, 
            tc.table_name, 
            kcu.column_name, 
            ccu.table_name AS foreign_table_name,
            ccu.column_name AS foreign_column_name 
          FROM information_schema.table_constraints AS tc 
          JOIN information_schema.key_column_usage AS kcu
            ON tc.constraint_name = kcu.constraint_name
            AND tc.table_schema = kcu.table_schema
          JOIN information_schema.constraint_column_usage AS ccu
            ON ccu.constraint_name = tc.constraint_name
            AND ccu.table_schema = tc.table_schema
          WHERE tc.constraint_type = 'FOREIGN KEY' 
            AND tc.table_schema = 'dados';
        "
        echo "✅ Constraints de chave estrangeira verificadas!"
    
    - name: Resumo Final
      if: success()
      run: |
        echo ""
        echo "======================================================"
        echo "✅ TODOS OS TESTES DO BANCO DE DADOS PASSARAM! ✅"
        echo "======================================================"
        echo ""
        echo "Configuração do banco de dados verificada:"
        echo "  ✅ Conexão PostgreSQL estabelecida"
        echo "  ✅ Schema 'dados' criado e verificado"
        echo "  ✅ Dump SQL importado com sucesso"
        echo "  ✅ Todas as tabelas existem (salas, perguntas, respostas, feedback)"
        echo "  ✅ Operações SELECT funcionando"
        echo "  ✅ Operações INSERT/DELETE funcionando"
        echo "  ✅ Estruturas de tabelas validadas"
        echo "  ✅ Contagem de registros recuperada"
        echo "  ✅ Constraints de chave estrangeira verificadas"
        echo ""
        echo "Banco de dados pronto para uso em produção! 🚀"
        echo ""
    
    - name: Mostrar informações de diagnóstico em caso de falha
      if: failure()
      run: |
        echo "=== Informações de Diagnóstico ==="
        echo ""
        echo "Versão do PostgreSQL:"
        PGPASSWORD=123456 psql -h localhost -U consultas -d avaliacoes -c "SELECT version();" || echo "Falha ao obter versão"
        echo ""
        echo "Bancos de Dados Disponíveis:"
        PGPASSWORD=123456 psql -h localhost -U consultas -l || echo "Falha ao listar bancos de dados"
        echo ""
        echo "Status do Serviço PostgreSQL:"
        pg_isready -h localhost -p 5432 -U consultas || echo "PostgreSQL não está pronto"
